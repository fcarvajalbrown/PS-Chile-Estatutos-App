name: ps_estatutos
description: Curso y lectura de los Estatutos Nacionales del Partido Socialista de Chile.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  shared_preferences: ^2.2.3
  flutter_svg: ^2.0.10

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_test:
    sdk: flutter

# Launcher icons generated from the official PS emblem. Regenerate after editing
# the source images with:  dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/img/ps_emblem.png"
  # iOS forbids alpha in app icons; flatten the roundel onto the paper color.
  remove_alpha_ios: true
  background_color_ios: "#F7F3EE"
  min_sdk_android: 21
  # Android adaptive icon: padded foreground so the ring is not clipped by the mask.
  adaptive_icon_background: "#F7F3EE"
  adaptive_icon_foreground: "assets/img/ps_emblem_padded.png"

flutter:
  uses-material-design: true
  assets:
    - assets/data/estatutos.json
    - assets/data/quiz.json
    - assets/data/callouts.json
    - assets/data/factboxes.json
    - assets/img/
